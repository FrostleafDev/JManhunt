# Do not change this number!
# Its only purpose is for checking if the config is up to date with the plugin
version: 1

# Should the plugin check for new updates and send an information message to
# admins and the console?
#
# The message can be changed in the locale files
check-for-updates: true

# Here you can choose the language for the plugin
#
# Available: en, de, fr
# You can add your own locale file by copying a locale in the 'locales' folder.
# Then just add the name without the '.yml'
locale: en

# Here you can choose how the plugin saves data in the long term for server restarts etc.
# You can only change this by restarting the server
#
# Available:
# - 'SQLITE' -> Saves the data in sqlite files in the plugins foldr
# - 'MYSQL'  -> Saves the data in a mariadb or mysql database
storage: SQLITE

# If you choose mysql above you have to set your database info here
# You can only change this by restarting the server
mysql:
  host: localhost
  port: 3306
  database: 'JManhunt'
  username: 'USER'
  password: 'PASSWORD'
  database-prefix: 'JM_'

##################################################################################
##                                                                              ##
##                               MANHUNT OPTIONS                                ##
##                                                                              ##
##################################################################################

# Should players without the 'jmanhunt.setup.bypass' or the 'jmanhunt.admin' be
# able to join in the setup phase?
#
# This can also be configured in the Manhunt UI with '/jmanhunt'
can-players-join-during-setup: false

# Should spectators be visible in the tab?
#
# Available:
# - 'HIDDEN' -> Spectators will not be shown in the tablist
# - 'SHOWN'  -> This is the default vanilla style, if the spectators are in spectator mode they will be italic
# - 'NORMAL' -> The player names won't be italic
spectators-visible: HIDDEN

# Should the team be displayed before the player names?
# Example: 'Runner | jozelot_'
team-prefix:
  tab: true
  nametags: true
  chat: true

# If the above is true this will be the format for the tablist and the player names in chat and nametags.
team-prefix-format: '{team} | {player_name}'

# Should the custom chat be enabled?
# Supports minimessage format.
# With the 'jmanhunt.chat.minimessage' permission players can use the <> minimessage format in chat messages.
#
# Attention: When you give this permission to players they can use the 'hover' and 'on_click' tags to try to
# get permissions or op
custom-chat: true
custom-chat-format: '{team} | {player_name} <dark_gray>» <gray>{message}'

# What is the goal for the runner/s to achieve?
#
# Available:
# - 'TIME' -> One of the runners has to survive for the given time
# - 'KILL' -> The runners have to kill a mob
runner-goal: KILL

# If you chose time, how long does it take to win?
# In seconds. e.g. 3600s -> 1h
runner-goal-time: 3600

# If you chose kill, which mob should the runners kill?
# And how often? If you chose 2 for example the ender dragon they would need to revive it.
runner-goal-kill:
  target-entity: ENDER_DRAGON
  times: 1

# Define the win/loss condition for the runners
#
# ALL_RUNNERS_ELIMINATED: The game continues until the very last runner is out of lives
# FIRST_RUNNER_ELIMINATED: The game ends immediately when any single runner loses all their lives
game-end-condition: ALL_RUNNERS_ELIMINATED

# Determine how lives are managed across the runner team
#
# INDIVIDUAL: Each runner has their own separate pool of lives
# SHARED: All runners share one global pool of lives
runner-life-type: INDIVIDUAL

# Set the amount of lives for a runner (or the team if SHARED).
# 1 = The game or participation ends upon the first death.
runner-lives: 1

# Should the weather and time be set to the given value when the manhunt starts?
reset-weather-time-on-start: false

# What should the weather than be?
# - 'CLEAR'
# - 'RAIN'
# - 'THUNDER'
default-weather: CLEAR

# What should the time than be?
# - 'DAY'
# - 'MIDNIGHT'
# - 'NIGHT'
# - 'SOON'
# - or your own value with the ingame '/time set' format: 1000d/s/t
default-time: DAY

# Should the Timer (Either the timer for the goal or the timer which shows how long the manhunt is running)
# be shown in the actionbar?
show-timer-in-actionbar: true

# These are the sounds the plugin uses for certain things.
# You can configure the keys here.
#
# The plugin uses the UI Category to send the sounds to
sounds:
  error: "entity.villager.no"
  success: "entity.player.levelup"
  pling: "block.note_block.pling"
  notify: "block.note_block.chime"
  experience: "entity.experience_orb.pickup"
  warning: 'block.note_block.bit'

# Should there be a custom join and leave message?
custom-join-leave-messages: true

# Should there be a sound when a player joins?
# This will only be played for the player
join-sound: true

# Should other team members be glowing for a player?
# Only for hunters and runners
glowing-team: false

