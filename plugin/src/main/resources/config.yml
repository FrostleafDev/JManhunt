##################################################################################
##                                                                              ##
##                                SYSTEM OPTIONS                                ##
##                                                                              ##
##################################################################################

# Do not change this number!
# Its only purpose is for checking if the config is up to date with the plugin
version: 1

# Should the plugin check for new updates and send an information message to
# admins and the console?
#
# The message can be changed in the locale files
check-for-updates: true

# Here you can choose the language for the plugin
#
# Available: en, de, fr
# You can add your own locale file by copying a locale in the 'locales' folder.
# Then just add the name without the '.yml'
locale: en

# Here you can choose how the plugin saves data in the long term for server restarts etc.
# You can only change this by restarting the server
#
# Available:
# - 'SQLITE' -> Saves the data in a local file (No database server required).
# - 'MYSQL'  -> Saves the data in a MariaDB or MySQL database
storage: SQLITE

# If you choose mysql above you have to set your database info here
# You can only change this by restarting the server
mysql:
  host: localhost
  port: 3306
  database: 'JManhunt'
  username: 'USER'
  password: 'PASSWORD'
  database-prefix: 'JM_'

# These are the sounds the plugin uses for certain things.
# You can configure the keys here.
#
# The plugin uses the UI Category to send the sounds to
sounds:
  error: "entity.villager.no"
  success: "entity.player.levelup"
  pling: "block.note_block.pling"
  notify: "block.note_block.chime"
  experience: "entity.experience_orb.pickup"
  warning: 'block.note_block.bit'

##################################################################################
##                                                                              ##
##                           Server & Visual Options                            ##
##                                                                              ##
##################################################################################

# Should players without the 'jmanhunt.setup.bypass' or the 'jmanhunt.admin' be
# able to join in the setup phase?
#
# This can also be configured in the Manhunt UI with '/jmanhunt'
can-players-join-during-setup: false

# Should spectators be visible in the tab?
#
# Available:
# - 'HIDDEN' -> Spectators will not be shown in the tablist
# - 'SHOWN'  -> This is the default vanilla style, if the spectators are in spectator mode they will be italic
# - 'NORMAL' -> The player names won't be italic
spectators-visible: HIDDEN

# Enable team prefixes in various places. Requires the format below.
# Example: 'Runner | jozelot_'
team-prefix:
  tab: true
  nametags: true
  chat: true

# If the above is true this will be the format for the tablist and the player names in chat and nametags.
team-prefix-format: '{team} | {player_name}'

# Should the custom chat be enabled?
# Supports minimessage format.
# With the 'jmanhunt.chat.minimessage' permission players can use the <> minimessage format in chat messages.
#
# Attention: When you give this permission to players they can use the 'hover' and 'on_click' tags to try to
# get permissions or op
custom-chat: true
custom-chat-format: '{team} | {player_name} <dark_gray>» <gray>{message}'

# Should there be a custom join and leave message?
custom-join-leave-messages: true

# Should there be a sound when a player joins?
# This will only be played for the player
join-sound: true

# Should the game be paused when one of the runners leave?
auto-pause-on-runner-leave: true

# Should the game be resumed when the missing runners are all back online?
#
# For this auto pause has to be true as well
auto-resume-on-runner-join: true

# Should the whole game be frozen when the game is paused?
# This includes entity AI, block updates, and weather.
pause-freeze-game: true

# Should all players be frozen when the game is paused?
# This prevents movement and blocks all damage/interactions.
# Note: If 'pause-freeze-game' is true, this is automatically active.
pause-only-freeze-players: true

# Should the timer be paused when the game is paused?
pause-freeze-timer: true

# How many seconds should the game stay paused before it's automatically canceled?
# Set to 0 for an infinite pause.
pause-timeout: 600

# Here you can enable the custom server motd field.
# This is only there so you won't need an extra plugin.
#
# This has no placeholder support
motd:
  enabled: true
  lines:
    - "A JManhunt server"
    - ""

# Here you can set how the max player count in the multiplayer screen looks like.
# This is only visual
# Mode options:
# - 'STATIC' -> Shows a static number
# - 'DYNAMIC' -> Increases the number by the given number
max-player-count:
  enabled: true
  mode: DYNAMIC # Both together mean that there is always one slot more than the current player count free
  number: 1

# Here you can enable the custom tablist
# Placeholders: {player_count}, {lives_left}, {current_team}, {runner_count}, {hunter_count}, {runner_goal}, {runner_goal_progress}, {runner_goal_entity}, {team_deaths}, {player_deaths}
tablist:
  enabled: true
  runner:
    header:
      - ""
      - "<aqua><b>JManhunt<reset>"
      - ""
    footer:
      - ""
      - "<gray>Lives: <green>{lives_left} <gray>| <green>{current_team}"
      - "<gray>Goal: <green>{runner_goal}"
      - ""
  hunter:
    header:
      - ""
      - "<aqua><b>JManhunt<reset>"
      - ""
    footer:
      - ""
      - "<gray>Deaths: <green>{player_deaths} <gray>| <green>{current_team}"
      - "<gray>Goal: <green>{runner_goal}"
      - ""
  spectator:
    header:
      - ""
      - "<aqua><b>JManhunt<reset>"
      - ""
    footer:
      - ""
      - "<gray>Goal: <green>{runner_goal}"
      - ""

# Timer settings
# Should the timer (Either time left or elapsed) be visible in the actionbar?
timer-in-actionbar: true

# Available placeholders: {s} (seconds), {m} (minutes), {h} (hours).
# The plugin automatically switches between these formats based on the elapsed time.
#
# This format is used when the timer is < 1m
timer-format-s: "<gradient:green:dark_green><b>{s}s"

# This format is used when the timer is < 1h
timer-format-ms: "<gradient:green:dark_green><b>{m}m {s}s"
# This format is used when the timer is > 1h
timer-format-hms: "<gradient:green:dark_green><b>{h}h {m}m {s}s"

##################################################################################
##                                                                              ##
##                               Manhunt Options                                ##
##                                                                              ##
##################################################################################

# What is the goal for the runner/s to achieve?
#
# Available:
# - 'TIME' -> One of the runners has to survive for the given time
# - 'KILL' -> The runners have to kill a mob
runner-goal: KILL

# If you chose time, how long does it take to win?
# In seconds. e.g. 3600s -> 1h
runner-goal-time: 3600

# If you chose kill, which mob should the runners kill?
# And how often? If you chose 2 for example the ender dragon they would need to revive it.
runner-goal-kill:
  target-entity: ENDER_DRAGON
  times: 1

# Define the win/loss condition for the runners
#
# ALL_RUNNERS_ELIMINATED: The game continues until the very last runner is out of lives
# FIRST_RUNNER_ELIMINATED: The game ends immediately when any single runner loses all their lives
#
# Eliminated runners will be moved to the SPECTATOR team.
game-end-condition: ALL_RUNNERS_ELIMINATED

# Determine how lives are managed across the runner team
#
# INDIVIDUAL: Each runner has their own separate pool of lives
# SHARED: All runners share one global pool of lives
#
# Eliminated runners will be moved to the SPECTATOR team.
runner-life-type: INDIVIDUAL

# Set the amount of lives for a runner (or the team if SHARED).
# 1 = The game or participation ends upon the first death.
runner-lives: 1

# Should other team members be glowing for a player?
# Only for hunters and runners
glowing-team: false

# Should the weather and time be set to the given value when the manhunt starts?
reset-weather-time-on-start: false

# What should the weather then be?
# - 'CLEAR'
# - 'RAIN'
# - 'THUNDER'
default-weather: CLEAR

# What should the time then be?
# - 'DAY'
# - 'MIDNIGHT'
# - 'NIGHT'
# - 'SOON'
# - The time in ticks (0 = Dawn, 6000 = Midday, 18000 = Midnight).
default-time: DAY

##################################################################################
##                                                                              ##
##                                 PERMISSIONS                                  ##
##                                                                              ##
##################################################################################

# jmanhunt.command                    -> For using the '/jmanhunt' command. With that you can just use like the help, version etc.
# jmanhunt.admin                      -> With this you have full access over the plugin
# jmanhunt.command.reload             -> You can reload the plugin via '/jmanhunt reload'
# jmanhunt.command.setup              -> You can set up the plugin via the ui and '/jmanhunt runner/hunter' etc
# jmanhunt.command.start              -> You can start the manhunt
# jmanhunt.command.end                -> You can end the manhunt
# jmanhunt.command.pause              -> You can pause the manhunt
# jmanhunt.command.open               -> You can open the manhunt
# jmanhunt.command.close              -> You can close the manhunt
# jmanhunt.command.reset              -> You can reset the manhunt
# jmanhunt.command.teams              -> You can manage the player teams
# jmanhunt.ui                         -> You can open the manhunt ui and change everything from above!
# jmanhunt.setup.bypass               -> You can join the server in the setup phase if it is enabled
# jmanhunt.chat.minimessage           -> You can use minimessage tags in chat

##################################################################################
##                                                                              ##
##                               PLACEHOLDER API                                ##
##                                                                              ##
##################################################################################

# %jmanhunt_team%                     -> The current team of the player
# %jmanhunt_lives%                    -> Current lives (Shows the individual's lives or the shared team pool)
# %jmanhunt_goal%                     -> TIME or KILLS
# %jmanhunt_goal_progress%            -> When KILLS is selected here it shows the amount of times the entity was killed
# %jmanhunt_goal_entity%              -> The target mob to kill (Only active when goal is set to KILLS)
# %jmanhunt_goal_remaining_time_s%    -> Remaining time to win in seconds
# %jmanhunt_goal_remaining_time_m%    -> Remaining time to win in minutes
# %jmanhunt_goal_remaining_time_h%    -> Remaining time to win in hours
# %jmanhunt_goal_remaining_formatted% -> Remaining time to win (Formats as mm:ss or hh:mm:ss depending on duration)
# %jmanhunt_timer_s%                  -> Total elapsed game time in seconds
# %jmanhunt_timer_m%                  -> Total elapsed game time in minutes
# %jmanhunt_timer_h%                  -> Total elapsed game time in hours
# %jmanhunt_timer_formatted%          -> Total elapsed game time (Formats as mm:ss or hh:mm:ss)
# %jmanhunt_runner_distance%          -> Distance to the nearest runner (Shows last known position if in a different dimension)
# %jmanhunt_status%                   -> The current game status: SETUP, PRE_GAME, RUNNING, PAUSE, ENDED
# %jmanhunt_active_runners%           -> The raw number of runners currently alive (e.g. '2')
# %jmanhunt_total_runners%            -> The total number of runners that started the game (e.g. '3')





