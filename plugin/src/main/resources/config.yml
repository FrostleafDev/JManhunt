##################################################################################
##                                                                              ##
##                                 PERMISSIONS                                  ##
##                                                                              ##
##################################################################################

# jmanhunt.command                    -> For using the '/jmanhunt' command. With that you can just use like the help, version etc.
# jmanhunt.admin                      -> With this you have full access over the plugin
# jmanhunt.command.reload             -> You can reload the plugin via '/jmanhunt reload'
# jmanhunt.command.setup              -> You can set up the plugin via the ui and '/jmanhunt runner/hunter' etc
# jmanhunt.setup.bypass               -> You can join the server in the setup phase if it is enabled
# jmanhunt.chat.minimessage           -> You can use minimessage tags in chat

##################################################################################
##                                                                              ##
##                               PLACEHOLDER API                                ##
##                                                                              ##
##################################################################################

# %jmanhunt_team%                     -> The current team of the player
# %jmanhunt_lives%                    -> Current lives (Shows the individual's lives or the shared team pool)
# %jmanhunt_goal%                     -> TIME or KILLS
# %jmanhunt_goal_progress%            -> When KILLS is selected here it shows the amount of times the entity was killed
# %jmanhunt_goal_entity%              -> The target mob to kill (Only active when goal is set to KILLS)
# %jmanhunt_goal_remaining_time_s%    -> Remaining time to win in seconds
# %jmanhunt_goal_remaining_time_m%    -> Remaining time to win in minutes
# %jmanhunt_goal_remaining_time_h%    -> Remaining time to win in hours
# %jmanhunt_goal_remaining_formatted% -> Remaining time to win (Formats as mm:ss or hh:mm:ss depending on duration)
# %jmanhunt_timer_s%                  -> Total elapsed game time in seconds
# %jmanhunt_timer_m%                  -> Total elapsed game time in minutes
# %jmanhunt_timer_h%                  -> Total elapsed game time in hours
# %jmanhunt_timer_formatted%          -> Total elapsed game time (Formats as mm:ss or hh:mm:ss)
# %jmanhunt_runner_distance%          -> Distance to the nearest runner (Shows last known position if in a different dimension)
# %jmanhunt_status%                   -> The current game status: SETUP, PRE_GAME, RUNNING, PAUSE, ENDED
# %jmanhunt_active_runners%           -> The raw number of runners currently alive (e.g. '2')
# %jmanhunt_total_runners%            -> The total number of runners that started the game (e.g. '3')





