name: JManhunt
version: '1.0.0'
main: de.jozelot.jmanhunt.JManhunt
api-version: '1.21'
authors: [ jozelot_ ]
description: High Performance Manhunt Engine für Minecraft. For Players and Developers.
website: https://jozelot.de

commands:
  jmanhunt:
    aliases: [manhunt, jm]
    permission: jmanhunt.command
    description: Command to manage the Manhunt Plugin

permissions:
  jmanhunt.command:
    default: true

  jmanhunt.admin:
    default: op
    children:
      jmanhunt.command.reload: true
      jmanhunt.command.start: true
      jmanhunt.command.end: true
      jmanhunt.command.pause: true
      jmanhunt.command.open: true
      jmanhunt.command.close: true
      jmanhunt.command.reset: true
      jmanhunt.setup.bypass: true

      jmanhunt.ui: true

  jmanhunt.command.reload:
    default: op

  jmanhunt.command.start:
    default: op

  jmanhunt.command.end:
    default: op

  jmanhunt.command.pause:
    default: op

  jmanhunt.command.open:
    default: op

  jmanhunt.command.close:
    default: op

  jmanhunt.command.reset:
    default: op

  jmanhunt.ui:
    default: op

  jmanhunt.setup.bypass:
    default: op
    description: Lets players join while the server is in the setup phase

  jmanhunt.chat.minimessage:
    default: op
    description: Allows the player to use the minimessage format. But if players can use that they can exploit the server