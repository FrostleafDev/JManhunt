prefix: '<dark_gray>[<aqua>JManhunt<dark_gray>]<reset>'

phase-setup-player-kick:
  - "<dark_gray>--- <aqua><b>JManhunt</b></aqua> <dark_gray>---"
  - ""
  - "<red>The manhunt is currently in setup mode!."
  - "<gray>You will be able to join when the manhunt is open."
  - ""
  - "<dark_gray>---------------------------"

admin-update-info:
  - ""
  - "{prefix} <gray>A new update is available: <aqua>v{version}"
  - "{prefix} <gray>Download via <click:open_url:'https://github.com/FrostleafDev/JManhunt/releases/latest'><hover:show_text:'<gray>Click to visit GitHub'><green>GitHub Releases</green></hover></click>"
  - ""

join-message: '<dark_gray>[<green>+<dark_gray>] <gray>{player_name}'
leave-message: '<dark_gray>[<red>-<dark_gray>] <gray>{player_name}'

command-only-player: "{prefix} <red>Action denied: <gray>Only players can do that"

command-jmanhunt-help-not-admin:
  - ""
  - "<dark_gray>------------------ <aqua>JManhunt <white>Player <dark_gray>------------------"
  - ""
  - "<gray>You are currently participating in a <aqua>Manhunt<gray>."
  - ""
  - "<yellow>Commands:"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt version'><click:run_command:'/jmanhunt version'>/jmanhunt version</click></hover> <dark_gray>- <gray>Show the plugin version"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt team'><click:run_command:'/jmanhunt team'>/jmanhunt team</click></hover> <dark_gray>- <gray>Shows your current team"
  - ""
  - "<dark_gray>-------------------------------------------"
  - ""

command-jmanhunt-help-admin:
  - ""
  - "<dark_gray>------------------ <aqua>JManhunt <white>Admin <dark_gray>------------------"
  - ""
  - "<yellow>Commands:"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt version'><click:run_command:'/jmanhunt version'>/jmanhunt version</click></hover> <dark_gray>- <gray>Show the plugin version"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt team'><click:run_command:'/jmanhunt team'>/jmanhunt team</click></hover> <dark_gray>- <gray>Shows your current team"
  - ""
  - "<yellow>Game Control:"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt start'><click:run_command:'/jmanhunt start'>/jmanhunt start</click></hover> <dark_gray>- <gray>Start the manhunt"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt end'><click:run_command:'/jmanhunt end'>/jmanhunt end</click></hover> <dark_gray>- <gray>End the manhunt"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt pause'><click:run_command:'/jmanhunt pause'>/jmanhunt pause</click></hover> <dark_gray>- <gray>Pause the manhunt"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt resume'><click:run_command:'/jmanhunt resume'>/jmanhunt resume</click></hover> <dark_gray>- <gray>Resume the manhunt"
  - ""
  - "<yellow>Setup & System:"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt open'><click:run_command:'/jmanhunt open'>/jmanhunt open</click></hover> <dark_gray>- <gray>Open for players"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt close'><click:run_command:'/jmanhunt close'>/jmanhunt close</click></hover> <dark_gray>- <gray>Close the manhunt"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt reload'><click:run_command:'/jmanhunt reload'>/jmanhunt reload</click></hover> <dark_gray>- <gray>Reload config"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt reset'><click:run_command:'/jmanhunt reset'>/jmanhunt reset</click></hover> <dark_gray>- <gray>Resets and deletes all plugin data"
  - ""
  - "<dark_gray>----------------------------------------------------"
  - ""

command-jmanhunt-reload-success: "{prefix} <gray>JManhunt was successfully reloaded"

command-jmanhunt-start-denied-in-setup: "{prefix} <red>Action denied: <gray>You have to <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt open'><click:run_command:'/jmanhunt open'>open</click></hover> <gray>the manhunt first."
command-jmanhunt-start-denied-already-running: "{prefix} <red>Action denied: <gray>The manhunt is already running."
command-jmanhunt-start-denied-already-over: "{prefix} <red>Action denied: <gray>The manhunt is already over! You have to <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt reset'><click:run_command:'/jmanhunt reset'>reset</click></hover> <gray>the manhunt first."
command-jmanhunt-start-denied-paused: "{prefix} <red>Action denied: <gray>The manhunt is currently paused! You have to <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt resume'><click:run_command:'/jmanhunt resume'>resume</click></hover> <gray>the manhunt to continue."
command-jmanhunt-start-success: "{prefix} <gray>The manhunt was started <green>successfully<gray>."

command-jmanhunt-reset-information:
  - ""
  - "{prefix} <red><b>Attention:</b> <gray>A reset will completely wipe your manhunt data!"
  - "{prefix} <gray>This means: <white>All teams and stats. <gray>Use this therefore to start a new manhunt."
  - "{prefix} <dark_red>If you are sure: <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt confirm'><click:run_command:'/jmanhunt confirm'>/jmanhunt confirm</click></hover>"
  - "{prefix} <gray>You have <yellow>10 seconds <gray>to confirm."
  - ""

command-manhunt-reset-kick:
  - "<dark_gray>--- <aqua><b>JManhunt</b></aqua> <dark_gray>---"
  - ""
  - "<gray>The current manhunt has been <red><b>reset</b><gray>."
  - "<gray>The world and all statistics were cleared."
  - ""
  - "<white>A new round is starting soon!"
  - ""
  - "<dark_gray>» <aqua>You can rejoin in a few seconds"
  - "<dark_gray>---------------------------"

command-jmanhunt-confirm-no-action: '{prefix} <gray>There is no pending action to <red>confirm<gray>.'
command-jmanhunt-confirm-expired: '{prefix} <gray>The action you are trying to confirm has <red>expired<gray>!'
command-jmanhunt-reset-success: '{prefix} <gray>The manhunt reset was started <green>successfully<gray>.'
command-jmanhunt-end-success: '{prefix} <gray>The manhunt was ended <green>successfully<gray>.'

command-jmanhunt-team-add-success: '{prefix} <green>{player_name} <gray>was added to the <green>{team} successfully<gray>.'
command-jmanhunt-team-remove-success: '{prefix} <green>{player_name} <gray>was removed from the <green>{team} successfully<gray>.'
command-jmanhunt-team-list-header: "<dark_gray>--- <aqua><b>Manhunt Team:</b> {team}</aqua> <dark_gray>---"
command-jmanhunt-team-list-player: "<hover:show_text:'<gray>Click to remove <white>{player_name}'><click:run_command:'/jmanhunt team {team} remove {player_name}'>{color}{player_name}</click></hover>"
command-jmanhunt-team-list-line: "<gray>Members: {players}"
command-jmanhunt-team-list-empty: "{prefix} <gray>The team <green>{team} <gray>is currently empty."

command-jmanhunt-list-header: '<dark_gray>--- <aqua><b>Manhunt Teams (Global)</b></aqua> <dark_gray>---'
command-jmanhunt-list-line: '<green>{team}: <gray>{players}'
command-jmanhunt-list-player: "<hover:show_text:'<gray>Click to remove <white>{player_name}'><click:run_command:'/jmanhunt team {team} remove {player_name}'>{color}{player_name}</click></hover>"
command-jmanhunt-list-footer: '<dark_gray>---------------------------'

command-jmanhunt-team-clear-success: "{prefix} <gray>Successfully removed <green>{count} <gray>players from team <green>{team}<gray>."
