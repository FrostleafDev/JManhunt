prefix: '<dark_gray>[<aqua>JManhunt<dark_gray>]<reset>'

phase-setup-player-kick: "<red>The server is currently in setup. You can't join now!"
admin-update-info:
  - ""
  - "{prefix} <gray>A new update is available: <aqua>v{version}"
  - "{prefix} <gray>Download via <click:open_url:'https://github.com/FrostleafDev/JManhunt/releases/latest'><hover:show_text:'<gray>Click to visit GitHub'><green>GitHub Releases</green></hover></click>"
  - ""

join-message: '<dark_gray>[<green>+<dark_gray>] <gray>{player_name}'
leave-message: '<dark_gray>[<red>-<dark_gray>] <gray>{player_name}'

command-only-player: "{prefix} <red>Action denied: <gray>Only players can do that"

command-jmanhunt-help-not-admin:
  - ""
  - "<dark_gray>------------------ <aqua>JManhunt <white>Player <dark_gray>------------------"
  - ""
  - "<gray>You are currently participating in a <aqua>Manhunt<gray>."
  - ""
  - "<yellow>Commands:"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt version'><click:run_command:'/jmanhunt version'>reset</click></hover> <dark_gray>- <gray>Show the plugin version"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt team'><click:run_command:'/jmanhunt team'>reset</click></hover> <dark_gray>- <gray>Shows your current team"
  - ""
  - "<dark_gray>-------------------------------------------"
  - ""

command-jmanhunt-help-admin:
  - ""
  - "<dark_gray>------------------ <aqua>JManhunt <white>Admin <dark_gray>------------------"
  - ""
  - "<yellow>Game Control:"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jm start'><click:run_command:'/jm start'>/jm start</click></hover> <dark_gray>- <gray>Start the manhunt"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jm stop'><click:run_command:'/jm stop'>/jm stop</click></hover> <dark_gray>- <gray>Stop the manhunt"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jm pause'><click:run_command:'/jm pause'>/jm stop</click></hover> <dark_gray>- <gray>Pause the manhunt"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jm resume'><click:run_command:'/jm resume'>/jm stop</click></hover> <dark_gray>- <gray>Resume the manhunt"
  - ""
  - "<yellow>Setup & System:"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jm open'><click:run_command:'/jm open'>/jm open</click></hover> <dark_gray>- <gray>Open for players"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jm close'><click:run_command:'/jm close'>/jm open</click></hover> <dark_gray>- <gray>Close the manhunt"
  - " <dark_gray>» <white><hover:show_text:'<gray>Click to run: <white>/jm reload'><click:run_command:'/jm reload'>/jm reload</click></hover> <dark_gray>- <gray>Reload config"
  - ""
  - "<dark_gray>----------------------------------------------------"
  - ""

command-jmanhunt-reload-success: "{prefix} <gray>JManhunt was successfully reloaded"

command-jmanhunt-start-denied-in-setup: "{prefix} <red>Action denied: <gray>You have to <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt open'><click:run_command:'/jmanhunt open'>open</click></hover> <gray>the manhunt first."
command-jmanhunt-start-denied-already-running: "{prefix} <red>Action denied: <gray>The manhunt is already running."
command-jmanhunt-start-denied-already-over: "{prefix} <red>Action denied: <gray>The manhunt is already over! You have to <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt reset'><click:run_command:'/jmanhunt reset'>reset</click></hover> <gray>the manhunt first."
command-jmanhunt-start-denied-paused: "{prefix} <red>Action denied: <gray>The manhunt is currently paused! You have to <white><hover:show_text:'<gray>Click to run: <white>/jmanhunt resume'><click:run_command:'/jmanhunt resume'>resume</click></hover> <gray>the manhunt to continue."
command-jmanhunt-start-success: "{prefix} <gray>The manhunt was started <green>successfully<gray>."
